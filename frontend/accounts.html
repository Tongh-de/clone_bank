{% extends "base.html" %}

{% block title %}我的账户 - 银行账户管理系统{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-8">
        <h2><i class="bi bi-wallet2"></i> 我的账户</h2>
    </div>
    <div class="col-md-4 text-end">
        <button class="btn btn-primary" onclick="showCreateModal()">
            <i class="bi bi-plus-circle"></i> 开户
        </button>
    </div>
</div>

<!-- 筛选 -->
<div class="card mb-4">
    <div class="card-body">
        <div class="row">
            <div class="col-md-4">
                <label class="form-label">状态筛选</label>
                <select class="form-select" id="statusFilter" onchange="loadAccounts()">
                    <option value="">全部</option>
                    <option value="active">正常</option>
                    <option value="frozen">冻结</option>
                    <option value="closed">已销户</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">&nbsp;</label>
                <div>
                    <strong>总余额: </strong>
                    <span id="totalBalance" class="text-success fs-5">¥0.00</span>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 账户列表 -->
<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>账户号</th>
                        <th>类型</th>
                        <th>余额</th>
                        <th>状态</th>
                        <th>开户时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="accountsTable">
                    <tr><td colspan="6" class="text-center text-muted">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- 分页 -->
<nav>
    <ul class="pagination justify-content-center mt-4" id="pagination"></ul>
</nav>

<!-- 开户 Modal -->
<div class="modal fade" id="createModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">开立新账户</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="createForm">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">账户类型</label>
                        <select class="form-select" id="account_type" name="account_type">
                            <option value="savings">储蓄账户</option>
                            <option value="checking">支票账户</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-primary">确定开户</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let currentPage = 1;

async function loadAccounts() {
    const status = document.getElementById('statusFilter').value;
    try {
        const res = await apiRequest(`/api/accounts/list?page=${currentPage}${status ? '&status_filter=' + status : ''}`);
        const accounts = res.data?.items || res.data || [];
        
        let html = '';
        if (accounts.length === 0) {
            html = '<tr><td colspan="6" class="text-center text-muted">暂无账户</td></tr>';
        } else {
            let total = 0;
            accounts.forEach(acc => {
                const statusBadge = acc.status === 'active' ? 'badge-active' 
                    : acc.status === 'frozen' ? 'badge-frozen' : 'badge-closed';
                const statusText = acc.status === 'active' ? '正常' 
                    : acc.status === 'frozen' ? '冻结' : '已销户';
                const typeText = acc.account_type === 'savings' ? '储蓄' : '支票';
                
                if (acc.status === 'active') {
                    total += parseFloat(acc.balance);
                }
                
                html += `
                    <tr>
                        <td><strong>${acc.account_number}</strong></td>
                        <td>${typeText}</td>
                        <td class="text-success fw-bold">¥${parseFloat(acc.balance).toFixed(2)}</td>
                        <td><span class="badge ${statusBadge}">${statusText}</span></td>
                        <td>${new Date(acc.created_at).toLocaleDateString()}</td>
                        <td>
                            <a href="/account/${acc.account_number}" class="btn btn-sm btn-info text-white">
                                <i class="bi bi-eye"></i>
                            </a>
                            ${acc.status === 'active' ? `
                                <button class="btn btn-sm btn-warning" onclick="freezeAccount('${acc.account_number}')">
                                    <i class="bi bi-snow2"></i>
                                </button>
                            ` : acc.status === 'frozen' ? `
                                <button class="btn btn-sm btn-success" onclick="unfreezeAccount('${acc.account_number}')">
                                    <i class="bi bi-sun"></i>
                                </button>
                            ` : ''}
                            ${acc.status !== 'closed' && parseFloat(acc.balance) === 0 ? `
                                <button class="btn btn-sm btn-danger" onclick="closeAccount('${acc.account_number}')">
                                    <i class="bi bi-x-circle"></i>
                                </button>
                            ` : ''}
                        </td>
                    </tr>
                `;
            });
            document.getElementById('totalBalance').textContent = '¥' + total.toFixed(2);
        }
        
        document.getElementById('accountsTable').innerHTML = html;
    } catch (error) {
        console.error('加载账户失败:', error);
    }
}

function showCreateModal() {
    new bootstrap.Modal(document.getElementById('createModal')).show();
}

async function freezeAccount(accountNumber) {
    if (!confirm('确定要冻结此账户吗?')) return;
    try {
        await apiRequest(`/api/accounts/${accountNumber}/freeze`, 'POST');
        showToast('账户已冻结');
        loadAccounts();
    } catch (error) {}
}

async function unfreezeAccount(accountNumber) {
    try {
        await apiRequest(`/api/accounts/${accountNumber}/unfreeze`, 'POST');
        showToast('账户已解冻');
        loadAccounts();
    } catch (error) {}
}

async function closeAccount(accountNumber) {
    if (!confirm('确定要销户吗?销户后无法恢复。')) return;
    try {
        await apiRequest(`/api/accounts/${accountNumber}/close`, 'POST');
        showToast('账户已销户');
        loadAccounts();
    } catch (error) {}
}

document.getElementById('createForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const account_type = document.getElementById('account_type').value;
    
    try {
        await apiRequest('/api/accounts/create', 'POST', { account_type });
        showToast('开户成功!');
        bootstrap.Modal.getInstance(document.getElementById('createModal')).hide();
        loadAccounts();
    } catch (error) {}
});

loadAccounts();
</script>
{% endblock %}
