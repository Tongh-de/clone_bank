{% extends "base.html" %}

{% block title %}AI客服 - 银行账户管理系统{% endblock %}

{% block content %}
<!-- 隐藏的用户信息 -->
<span id="currentUserName" style="display:none;">{{ user.full_name if user else '用户' }}</span>

<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span>
                    <i class="bi bi-robot"></i> 
                    AI智能客服 - 小银
                </span>
                <button class="btn btn-sm btn-outline-primary" onclick="clearChat()">
                    <i class="bi bi-trash"></i> 清空对话
                </button>
            </div>
            <div class="card-body p-0">
                <div id="chatContainer" class="chat-container">
                    <div class="d-flex justify-content-start mb-3">
                        <div class="ai-message">
                            <div class="ai-avatar">
                                <i class="bi bi-robot"></i>
                            </div>
                            <div class="message-content">
                                <div class="message-header">小银</div>
                                <div class="ai-bubble" id="welcomeMessage">
                                    您好！我是银行AI智能客服小银，请问有什么可以帮助您的吗？
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="chat-input-area p-3 border-top">
                    <div class="input-group">
                        <input type="text" id="chatInput" class="form-control" placeholder="输入您的问题，按回车发送..." onkeypress="handleKeyPress(event)">
                        <button class="btn btn-primary" type="button" onclick="sendMessage()">
                            <i class="bi bi-send"></i> 发送
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.chat-container {
    height: 500px;
    overflow-y: auto;
    padding: 16px;
    background: #f5f7fa;
}

.user-message, .ai-message {
    display: flex;
    margin-bottom: 12px;
    align-items: flex-start;
}

.user-message {
    flex-direction: row-reverse;
}

.ai-avatar {
    width: 40px;
    height: 40px;
    border-radius: 6px;
    background: #1a365d;
    color: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
}

.user-avatar {
    width: 40px;
    height: 40px;
    border-radius: 6px;
    background: #4a5568;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
    object-fit: cover;
}

.message-content {
    max-width: 70%;
    margin: 0 10px;
}

.message-header {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 4px;
    font-weight: 500;
}

.ai-bubble {
    padding: 10px 14px;
    border-radius: 8px;
    background: white;
    color: var(--text-primary);
    border: 1px solid var(--border-color);
    line-height: 1.5;
    font-size: 14px;
}

.user-bubble {
    padding: 10px 14px;
    border-radius: 8px;
    background: white;
    color: var(--text-primary);
    border: 1px solid var(--border-color);
    line-height: 1.5;
    font-size: 14px;
}

.typing-indicator {
    display: flex;
    gap: 5px;
    padding: 16px;
}

.typing-indicator span {
    width: 8px;
    height: 8px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: typing 1.4s infinite ease-in-out;
}

.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
}
</style>
{% endblock %}

{% block extra_js %}
<script>
let conversationHistory = [];
const userName = document.getElementById('currentUserName').textContent || '用户';

// 生成用户头像
function generateAvatar(username) {
    const seed = encodeURIComponent(username);
    return `https://api.dicebear.com/7.x/adventurer/svg?seed=${seed}&backgroundColor=b6e3f4,c0aede,d1d4f9,ffd5dc,ffdfbf`;
}

function getWelcomeMessage() {
    return `您好，${userName}！我是银行AI智能客服小银，请问有什么可以帮助您的吗？`;
}

function addMessage(role, content) {
    const container = document.getElementById('chatContainer');
    const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    
    const messageDiv = document.createElement('div');
    messageDiv.className = role === 'user' ? 'user-message' : 'ai-message';
    
    if (role === 'user') {
        messageDiv.innerHTML = `
            <img class="user-avatar" src="${generateAvatar(userName)}" alt="头像">
            <div class="message-content" style="align-items: flex-end;">
                <div class="message-header">我 · ${time}</div>
                <div class="user-bubble">${escapeHtml(content)}</div>
            </div>
        `;
    } else {
        messageDiv.innerHTML = `
            <div class="ai-avatar">
                <i class="bi bi-robot"></i>
            </div>
            <div class="message-content">
                <div class="message-header">小银 · ${time}</div>
                <div class="ai-bubble">${escapeHtml(content)}</div>
            </div>
        `;
    }
    
    container.appendChild(messageDiv);
    container.scrollTop = container.scrollHeight;
}

function showTyping() {
    const container = document.getElementById('chatContainer');
    const typingDiv = document.createElement('div');
    typingDiv.id = 'typingIndicator';
    typingDiv.className = 'ai-message';
    typingDiv.innerHTML = `
        <div class="ai-avatar">
            <i class="bi bi-robot"></i>
        </div>
        <div class="message-content">
            <div class="typing-indicator">
                <span></span><span></span><span></span>
            </div>
        </div>
    `;
    container.appendChild(typingDiv);
    container.scrollTop = container.scrollHeight;
}

function hideTyping() {
    const typing = document.getElementById('typingIndicator');
    if (typing) typing.remove();
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML.replace(/\n/g, '<br>');
}

async function sendMessage() {
    const input = document.getElementById('chatInput');
    const message = input.value.trim();
    
    if (!message) return;
    
    input.value = '';
    addMessage('user', message);
    conversationHistory.push({ role: 'user', content: message });
    showTyping();
    
    try {
        const response = await fetch('/api/ai/chat/stream', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                messages: conversationHistory
            })
        });
        
        const data = await response.json();
        hideTyping();
        
        if (!response.ok) {
            throw new Error(data.detail || data.message || '服务出错');
        }
        
        // 适配统一响应格式
        const aiResponse = data.data?.response || data.response || data.data || '';
        addMessage('assistant', aiResponse);
        conversationHistory.push({ role: 'assistant', content: aiResponse });
    } catch (error) {
        hideTyping();
        addMessage('assistant', '抱歉，服务暂时不可用，请稍后再试。错误信息: ' + error.message);
    }
}

function clearChat() {
    conversationHistory = [];
    document.getElementById('chatContainer').innerHTML = `
        <div class="ai-message">
            <div class="ai-avatar">
                <i class="bi bi-robot"></i>
            </div>
            <div class="message-content">
                <div class="message-header">小银</div>
                <div class="ai-bubble">
                    对话已清空，${userName}，请问有什么可以帮助您的吗？
                </div>
            </div>
        </div>
    `;
}

function handleKeyPress(event) {
    if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
    }
}

// 页面加载时更新欢迎消息
document.getElementById('welcomeMessage').textContent = getWelcomeMessage();

document.getElementById('chatInput').focus();
</script>
{% endblock %}
