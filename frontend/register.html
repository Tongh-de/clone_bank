{% extends "base.html" %}

{% block title %}注册 - 银行账户管理系统{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="icon-wrapper">
            <i class="bi bi-person-plus-fill"></i>
        </div>
        
        <h3>创建账户</h3>
        <p class="subtitle">加入银行账户管理系统</p>
        
        <form id="registerForm">
            <div class="mb-3">
                <label class="form-label">用户名</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                    <input type="text" class="form-control" id="username" name="username" required minlength="3" placeholder="至少3个字符">
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">姓名</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="full_name" name="full_name" required placeholder="请输入真实姓名">
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">邮箱</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control" id="email" name="email" placeholder="选填">
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">密码</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" name="password" required minlength="6" placeholder="至少6个字符">
                </div>
            </div>
            
            <div class="mb-4">
                <label class="form-label">确认密码</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" required placeholder="再次输入密码">
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 py-2">
                <i class="bi bi-check-circle"></i> 注册
            </button>
        </form>
        
        <div class="form-footer">
            <p>已有账户? <a href="/login">立即登录</a></p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const username = document.getElementById('username').value;
    const full_name = document.getElementById('full_name').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const confirm_password = document.getElementById('confirm_password').value;
    
    if (password !== confirm_password) {
        showToast('两次密码输入不一致', true);
        return;
    }
    
    try {
        showLoading();
        const response = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, full_name, email, password })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
            throw new Error(data.detail || '注册失败');
        }
        
        showToast('注册成功!正在跳转...');
        setTimeout(() => window.location.href = '/login', 1000);
    } catch (error) {
        showToast(error.message, true);
    } finally {
        hideLoading();
    }
});
</script>
{% endblock %}
